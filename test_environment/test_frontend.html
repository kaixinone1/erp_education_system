<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>前端API测试</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test-result { margin: 10px 0; padding: 10px; border: 1px solid #ccc; }
        .success { background: #d4edda; }
        .error { background: #f8d7da; }
        pre { background: #f5f5f5; padding: 10px; overflow: auto; }
    </style>
</head>
<body>
    <h1>前端API测试</h1>
    <div id="results"></div>

    <script>
        const resultsDiv = document.getElementById('results');

        function addResult(title, content, isError = false) {
            const div = document.createElement('div');
            div.className = 'test-result ' + (isError ? 'error' : 'success');
            div.innerHTML = `<h3>${title}</h3><pre>${content}</pre>`;
            resultsDiv.appendChild(div);
        }

        async function testAPI(teacherId) {
            const templateId = encodeURIComponent('职工退休申报表html');
            const url = `http://localhost:8000/api/template-field-mapping/preview/${templateId}?teacher_id=${teacherId}&mode=fill`;
            
            try {
                const response = await fetch(url);
                const html = await response.text();
                
                let foundName = '未找到';
                if (html.includes('王军峰')) foundName = '王军峰';
                else if (html.includes('王德')) foundName = '王德';
                
                const remaining = (html.match(/\{\{\s*姓名\s*\}\}/g) || []).length;
                
                addResult(
                    `教师ID ${teacherId} 测试结果`,
                    `URL: ${url}\n生成姓名: ${foundName}\n剩余占位符: ${remaining}\nHTML长度: ${html.length}`
                );
            } catch (error) {
                addResult(
                    `教师ID ${teacherId} 测试失败`,
                    `错误: ${error.message}`,
                    true
                );
            }
        }

        // 测试两个教师
        testAPI(273);
        testAPI(299);
    </script>
</body>
</html>
